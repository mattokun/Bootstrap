<!DOCTYPE html>

<html lang="ja">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォトギャラリー</title>
    <meta name="description" content="かわいい猫のフォトギャラリーです。">
    <!-- Bootstrap DocsのCDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap IconsのCDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- ノーマライズCSSのCDN -->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="stylesheet" href="css/gallery.css">
  </head>

  <body>
    <!-- ナビゲーションバー：Bootstrap⇒Docs⇒左側のサイドバーのComponents⇒Navbar⇒Supported content -->
    <!-- sticky-top：スクロール時にヘッダーを固定する -->
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
        <div class="container-fluid">
          <!-- Bootstrap Icons（検索:photo⇒images） -->
          <!-- me（margin end）：margin-right -->
          <a class="navbar-brand" href="#"><i class="bi bi-images me-1"></i>Cats</a>
          <!-- ハンバーガーメニュー（画面幅が狭いとき用） -->
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
            aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <!-- activeにすることで現在Homeのページを表示していることを示す -->
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">New</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">About</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      <!-- px：左右のpadding、py：上下のpadding -->
      <div class="px-3 py-5 bg-img">
        <!-- text-white：テキストの色を白に指定 -->
        <div class="container text-white">
          <!-- Bootstrap Icons（検索:camera⇒camera2） -->
          <h1><i class="bi bi-camera2"></i>フォトギャラリー</h1>
          <p>かわいい猫たちのフォトギャラリーをご覧ください。</p>
        </div>
      </div>
      <!-- mt：margin top（数字を0~5の範囲で変えることで調整できる） -->
      <div class="container mt-4">
        <!-- gy：gutter-y（※gutter：溝） -->
        <!-- グリッドシステムのすべてのコンテンツの垂直方向の間隔を数字を0~5の範囲で変えることで調整できる -->
        <div class="row gy-3">
          <div class="col-lg-4 col-sm-6">
            <!-- class="img-thumbnail"：画像の高さを親要素に合わせて、枠線を付けてくれる -->
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/C0zDWAPFT9A.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/fEK4jvgnApg.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/egfS7HzgKcc.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/e-S23SJzFqs.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/Hnwm8ktAd6E.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/gb3gq2Nh5xE.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/XKhV1c4oV7c.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/7qau-YIXn90.jpg" alt="cat">
          </div>
          <div class="col-lg-4 col-sm-6">
            <img class="img-thumbnail"
              src="https://learnwithnakamura.s3.ap-northeast-1.amazonaws.com/bootstrap5/QTe-MHNUrz4.jpg" alt="cat">
          </div>
        </div>
      </div>
    </main>

    <footer class="py-4 mt-5 bg-dark text-center">
      <div class="container">
        <!-- 50：opacity（不透明度）を50%に指定 -->
        <small class="text-white-50 small">&copy; 2026 masato.jp</small>
      </div>
    </footer>

    <!-- Bootstrap DocsのCDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>

</html>
